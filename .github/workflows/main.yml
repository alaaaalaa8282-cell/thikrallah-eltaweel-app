name: Build Android APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 18
        uses: actions/setup-java@v4
        with:
          java-version: '18'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          mkdir -p output
          cp app/build/outputs/apk/release/*.apk \
            "output/محمد-عبد-العظيم-اذكر-الله.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: محمد-عبد-العظيم-اذكر-الله
          path: output/*.apk
          retention-days: 30
