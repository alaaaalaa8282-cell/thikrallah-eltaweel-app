name: محمد عبد العظيم اذكر ربك

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: بناء التطبيق
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 18
        uses: actions/setup-java@v4
        with:
          java-version: '18'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          mkdir -p output
          cp app/build/outputs/apk/release/*.apk \
            "output/محمد-عبد-العظيم-اذكر-ربك.apk"

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: output/محمد-عبد-العظيم-اذكر-ربك.apk
